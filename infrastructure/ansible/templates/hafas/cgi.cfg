tms_enable           1


%
% Komprimierung der App-Kommunikation
% ===================================
hciGZipEncodingAllowed 1


%
% Absicherung der Zugriffe per Hashpruefung
% =========================================
navigator_check_requestHashValue   1
navigator_check_requestPrivateKey  bdI8UVj40K5fvxwf


%
% Ueberpruefung wegen nicht authorisierter Anfragen
% =================================================
h2g_direct_checkClientType     1
h2g_direct_allowedClientTypes  ANDROID, J2ME


%
% Railnavigator Download URL
% ==========================
mobileParameter.hafas2GoDownloadURL  http://railnavigator%-ENV%.bahn.de/bin/rnav/detect.exe/d?processRedirect


%
% Anbindung Funktion "Mobile Reservierung"
% ========================================
mobileParameter.useDocumentTypeDetection  1
mobileParameter.shopEntryUrl              http://fahrkarten-bd11.bku-web.db.de/mobile/bu/hf.post?
mobileParameter.ticketShopEntryUrl        https://fahrkarten-bd11.bku-web.db.de/mobile/bu/hf.post?
mobileParameter.tariffRequest             w x i p
mobileParameter.useMobileTicketShop       1
mobileParameter.portalUrl                 http://www.bahn.de/m/view/$(rfcLanguage_$(language))/index.shtml
mobileParameter.imprintUrl                http://www.bahn.de/m/view/$(rfcLanguage_$(language))/home/kontakt/impressum.shtml


%
% Maximale Aufenthaltsdauer an Via-Bahnhoefen (Auswirkung auf
% erlaubte Werte und Formatanzeige)
% ===========================================================
mobileParameter.stopsNearMaxDist  1000


%
% Verbindungsueberwachung
% =======================
%
% Im Standardablauf sperren oder nicht
% 1 -> fuehrt bei Angabe von monitorProcess=yes auf die Standardauskunft
% 0 -> schaltet beide Ablaeufe frei
abo_disable_monitoringOfConnections  0

% Umleitungsmechanismus auf die Mobilversion aktivieren/deaktivieren.
abo_disable_redirection  0

% Basisurl der Mobilversion fuer Redirect/Verlinkung ohne Pathinfo (/dn)
% auf die Mobilversion.
abo_mobile_redirection_base_url  http://{{servername_reiseauskunft}}/bin/mobil/query.exe

% Basisurl der Reiseauskunft fuer Verlinkung ohne Pathinfo
% auf die Standardversion.
abo_standard_redirection_base_url  http://{{servername_reiseauskunft}}/bin/query.exe


%
% Zuglauf Plus
% ============
%
% Anfragen bis zu <x> Tagen in die Zukunft sind erlaubt. Bei 334erschreitung wird
% ein Fehler IN9 ausgegeben.
zplus_ts_request_offset  5

% Betrifft die aktiven Tage im Kalender des Zuglaufeinstieges und die Generierung der
% Fehlermeldung IN9 im Deeplinkeinstieg.
% 0 -> keine Uebersteuerung
% 1 -> Uebersteruerung findet statt
zplus_disable_request_offset  1

% Aktualisierungsintervall der Darstellung in Sekunden (>0).
zplus_refresh_interval  300

% Anzahl der Zuege der Bahnhofstafel (>0). Kann ueberschritten werden, wenn in der letzten
% angezeigten Minute mehrere Zuege fahren.
zplus_stb_num_trains  5

% Breite des angezeigten Kartenbereiches in Metern ab dem das Einblenden von
% POIs und HIM Meldungen erlaubt wird.
zplus_map_zoomwidth_poi             15000
zplus_map_zoomwidth_him             15000
zplus_map_zoomwidth_active_station  6000
zplus_map_zoomwidth_surroundings    2000

% Zuglauf+ Taxirufnummer
zplus_taxi_phonenumber  22456

% Produktbitfeld - ein Bit pro Produktklasse von links nach rechts aufsteigend:
% ICE, IC, IR, RE, S, Bus, Schiff, U-Bahn, Stb, AST
% IR und RE muessen immer zusammen gesetzt oder  zuruegckgesetzt werden.
zplus_stb_productfilter  11111001000


%
% Parameter, um beim Test unbemerkte Spruenge in die Produktion zu vermeiden
% ==========================================================================
dbBasicUrl         www-abn.bahn.de
dbBasicUrl_mobile  mcontent.bahn.de


%
% Neue Konfigurationsdatei fuer mobilen Sparpreisfinder (Stammdaten)
% ==================================================================
psLocationData  PreissucheAuslandBhfe.csv


%
% Verbindungscode abrufen
% =======================
verbindungsCode_activate           1
verbindungsCode_localStorageDir    /var/app/bdirekt/spool/vcode/
verbindungsCode_globalStorageDir   /var/app/bdirekt/nfs/spool/nas/vcode/
verbindungsCode_checkBCCreated     1
verbindungsCode_maxStorageRetries  5
verbindungsCode_signatureKey       bahndirekt


%
% Ueberlastschutz
% ===============
%
% off|overloadClient|overloadServer|construction|hiddenBooking
booking_redirectionMode  overloadServer

% Baustellenseite im Modus 'construction'
booking_redirectionURL_constructionSite  http://www.bahn.de/p/view/buchung/auskunft/wartung.shtml

% Hinweisseite bei Ueberlast
booking_redirectionURL_overload  http://www.bahn.de/p/view/buchung/auskunft/status.shtml

% Ueberlastseite mit Countdown (1) oder URL aus stbooking_redirectionURL_overload
booking_redirectionPage_fromHafas  1

% Startzeitpunkt fuer Modus (Format YYYYMMDDhhmm)
booking_redirectionStart  201300101000
booking_redirectionEnd    209912312359

% Schwellwert fuer durchzulassende Anfragen in Prozent
booking_redirectionPercentageToPass  100


%
% Ratelimiter
% ===========
%
% Globaler Schalter. Per Default ist die Funktionalitaet deaktiviert.
ratelimiter_activate  1
!include              /app/bdirekt/home/komfort/httpd/bin/ratelimiter.cfg

% Separater Schalter Buchungsschiene.
% Im deaktivierten Zustand wird der serverbasierte Ueberlastschutz verwendet
ratelimiterBooking_active  1


%
% Facelift
% ========
contentBoxBasePath $(protocol)//{{servername_imgbahn}}/{% if dev %}{% else %}bd//{% endif %}appcontent/jsonp/auskunft/
!include ./resources.cfg


%
% Tagmanagment
% Auslagerung der TM-Konfiguration in eine eigene Datei
% =====================================================
!include ./tagmanagement.cfg


%
% Umstellung der Auskunft auf SessionCookie
% =========================================
%
%Gibt an, ob die in diesem Konzept beschriebene neue Logik greift (1), oder ob das alte (pre ID2935) Verhalten (URL-Rewriting) wiederhergestellt wird (0).
% Mit dem Auf-0-Setzen dieses Parameters haben alle anderen in dieser Tabelle aufgeführten Konfig-Parameter keine Wirkung mehr.
enableCookieUse 1

% ld-Parameter per URL, Cookie oder beidem uebermitteln
ldPropagation both

% Falls ldPropagation=both, URL-Parameter trotzdem weglassen, wenn ein ld-Cookie vorhanden ist
omitLdInUrlWhenCookiesPresent  0

% ident/seqnr per URL, Cookie oder beidem uebermitteln
identPropagation  both

% Falls ident/seqnr in Cookie und URL vorhanden, welcher Wert soll gewinnen
identPreference  url

% Falls ldPropagation=both, Url-Parameter trotzdem weglassen, wenn ein ident/seqnr-Cookie vorhanden ist
omitIdentInUrlWhenCookiesPresent  0

% Fallback auf den jeweils anderen Parameter, falls die Session aus der bevorzugten Methode nicht gelesen werden kann.
identFallbackOnMissingSession  1

% Host, auf den umgeleitet werden soll
cookieBlockerRedirectDomain reiseauskunft%-ENV%.bahn.de


%
% Session Handling Auskunft wegen AWS
% ===================================
%

% Pfad zur Lib
querySessionCacheDriverLib /app/bdirekt/home/komfort/httpd/bin/lib/libqscd.so

% Aktivierung/Deaktivierung der Cloudspeicherung (0 = Default)
qscd_useSessionCache 0

% Komprimierung mittels LZ4
% 0 - Deaktivierung der Komprimierung
% 1 - Aktivierung der Kompression (falls Schwellwert ueberschritten)
qscd_useCompression  1

% Schwellwert Kompression in Bytes
qscd_compressAbove 4096

% Max. Sessiongroesse in der Cloud
qscd_noSessionCachingAbove 52428800

% Derzeit max. 16 Redisknoten (ein Knoten pro Zeile), ansonsten s. qscd.h
qscd_redisAddr dev-sessioncache.k4beue.0001.euc1.cache.amazonaws.com:6379

% Zu verwendender Datenbankindex
qscd_redisDBIndex  0

%  Passwort zur Authentifizierung beim Redis-Server
qscd_redisPassword

% Timeout fuer Connect, Auth, Datenbankindex, Delete und Set
qscd_redisTimeout 5000

% Timeout fuer Get-Anfragen
qscd_redisGetTimeout 5000

%
% SAM: Ausreserviertheitsanzeige per HIM-Meldung
% ==============================================
outOfReservation_addFlagsToPERequests  1


%
% Verteilung Anfragen zwischen Rechenzentrum und AWS Cloud
% ========================================================
% Aktivierung des dc Cookies (0/1)
dcc_active  1

% Wert des Datacenter Cookies.
dcc_datacenter  cld1

% TTL des Cookies.
% = 0 - deaktiviert (Session Cookie),
% > 0 - TTL des Cookies
dcc_ttl  0

% Domain unter der der Cookie gesetzt wird.
dcc_cookiedomain  .bahn.de

%
% Hybridauskunft
%
% Generelle Aktivierung der Hybridsuche in der Oberflaeche
% ========================================================
HYBRIDSUCHE_active  1

% Steuerung der Hybridsuche Checkbox
%  INITIALLY_ON => Checkbox sichtbar und angehakt
%  INITIALLY_OFF => Checkbox sichtbar und abgehakt
%  HIDDEN_ON => Checkbox nicht sichtbar, Hybridsuche aktiviert
%  HIDDEN_OFF => Checkbox nicht sichtbar, Hybridsuche deaktiviert
HYBRIDSUCHE_mode  INITIALLY_ON


%
% Bereinigung der http-Aufrufe aus dem Template heraus
% ====================================================
internal_request_address  10.52.99.8:8081


%
% TCP/IP-Krams
% ============
who_am_i       {{servername_reiseauskunft}}
error_address  reiseportal@bahn.de


%
% Soll die Hostkonfiguration ueber net.cfg erfolgen
% =================================================
use_netconf  1
hafas_server_timeout_connect 3

