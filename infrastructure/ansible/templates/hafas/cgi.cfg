%
% Privater Schluessel zur Hashwertpruefung des Urlparameters mbsiRef
% mbsiRef=<key>-<md5-hash>, Test auf: md5(<key><privater Schluessel)==<md5-hash>
% Der Parameter muss zwingend angegeben werden
mbsiref_signatureKey  bahndirekt

% Pfad zu den WEC-Key-basierten MBS-Dateien bildet sich aus:
% <dbmbs_path>/<dbmbs_wecSubdirPrefix><dbmbs_wecRefkeyPrefixLen Zeichen der mbsiRef>/.
% dbmbs_wecRefkeyPrefixLen definiert die Anzahl der Zeichen, die von der mbsiRef zur
% Bestimmung des Subpfades genommen werden. Default ist 2.
% dbmbs_wecSubdirPrefix ist der Praefix fuer Namensbildung der Subdirectories von
% dbmbs_path, in denen die WEC-Key-basierten MBS-Dateien abgelegt werden.
% Default: duv
dbmbs_wecSubdirPrefix     duv
dbmbs_wecRefkeyPrefixLen  2


